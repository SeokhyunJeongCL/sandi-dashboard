name: Update Dashboard

on:
  schedule:
    # 평일 오전 8시~오후 8시, 2시간마다 (KST = UTC+9)
    - cron: '0 23,1,3,5,7,9,11 * * 0-4'   # Mon-Fri 08,10,12,14,16,18,20 KST
  workflow_dispatch:                         # 수동 실행 버튼

permissions:
  contents: write  # docs/index.html 커밋을 위해 필요

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate dashboard
        env:
          JIRA_BASE_URL:   ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL:      ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:  ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT:    ${{ secrets.JIRA_PROJECT }}
        run: node jira-dashboard.mjs

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: dashboard update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
