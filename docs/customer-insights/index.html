<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANDI Customer Insights</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap@2.3.1/dist/chartjs-chart-treemap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix@2.0.1/dist/chartjs-chart-matrix.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   DESIGN SYSTEM
   ═══════════════════════════════════════════════════ */
:root {
  --bg: #0a0b10;
  --surface: #12141d;
  --surface2: #1a1d2b;
  --surface3: #222639;
  --border: #2a2e42;
  --text: #e8eaf0;
  --text-dim: #7c819a;
  --text-muted: #4e5270;
  --accent: #6366f1;
  --accent2: #818cf8;
  --accent3: #4f46e5;
  --green: #10b981;
  --green-bg: rgba(16,185,129,.08);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,.08);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,.08);
  --orange: #f97316;
  --blue: #3b82f6;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --pink: #ec4899;
  --teal: #14b8a6;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,.25);
  --glow: 0 0 20px rgba(99,102,241,.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Pretendard','Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}
.container { max-width: 1440px; margin: 0 auto; padding: 0 28px; }

/* ─── Header ─── */
.header {
  background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
  border-bottom: 1px solid rgba(99,102,241,.2);
  padding: 24px 0;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(99,102,241,.12) 0%, transparent 60%);
}
.header-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; position: relative; z-index: 1; }
.header h1 { font-size: 24px; font-weight: 800; letter-spacing: -.5px; }
.header h1 span { background: linear-gradient(135deg, #818cf8, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-sub { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
.header-meta { display: flex; align-items: center; gap: 18px; font-size: 13px; color: var(--text-dim); }
.live-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); display: inline-block; box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 8px var(--green)} 50%{opacity:.4;box-shadow:none} }

/* ─── Tabs ─── */
.tabs {
  display: flex; gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px;
  margin: 24px 0;
  overflow-x: auto;
}
.tab {
  padding: 11px 24px; border-radius: 12px; cursor: pointer;
  font-size: 14px; font-weight: 600; color: var(--text-dim);
  white-space: nowrap; transition: all .25s; border: none; background: none;
  position: relative;
}
.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active {
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  color: #fff;
  box-shadow: 0 2px 12px rgba(99,102,241,.3);
}
.tab-count {
  display: inline-block; background: rgba(255,255,255,.15);
  padding: 1px 7px; border-radius: 10px; font-size: 11px; margin-left: 6px;
}
.tab-panel { display: none; animation: fadeIn .3s ease; }
.tab-panel.active { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* ─── KPI Cards ─── */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.kpi:hover { transform: translateY(-2px); box-shadow: var(--glow); }
.kpi::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
}
.kpi-icon { font-size: 24px; margin-bottom: 8px; }
.kpi-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.kpi-value { font-size: 32px; font-weight: 800; margin: 4px 0; font-variant-numeric: tabular-nums; }
.kpi-sub { font-size: 12px; font-weight: 500; }
.kpi-sub.up { color: var(--green); }
.kpi-sub.up::before { content: '▲ '; }
.kpi-sub.down { color: var(--red); }
.kpi-sub.down::before { content: '▼ '; }
.kpi-sub.neutral { color: var(--text-dim); }
.kpi-spark { position: absolute; bottom: 0; right: 0; width: 100px; height: 40px; opacity: .4; }

/* ─── Score Ring ─── */
.score-section { text-align: center; }
.score-ring { position: relative; display: inline-block; margin-bottom: 8px; }
.score-ring svg { transform: rotate(-90deg); filter: drop-shadow(0 0 8px rgba(99,102,241,.3)); }
.score-ring .value {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 36px; font-weight: 800;
}
.score-ring .label-text {
  position: absolute; top: 65%; left: 50%; transform: translate(-50%,0);
  font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;
}

/* ─── Grid ─── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 24px; }
.grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 24px; }
@media(max-width:1000px) { .grid-2,.grid-3,.grid-2-1,.grid-1-2 { grid-template-columns: 1fr; } }

/* ─── Card ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  transition: box-shadow .2s;
}
.card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.15); }
.card h3 {
  font-size: 15px; font-weight: 700; margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
  color: var(--text);
}
.card h3 .icon { font-size: 20px; }
.card-subtitle { font-size: 12px; color: var(--text-dim); margin-top: -12px; margin-bottom: 16px; }

/* ─── Chart ─── */
.chart-container { position: relative; width: 100%; }
.chart-container.h350 { height: 350px; }
.chart-container.h300 { height: 300px; }
.chart-container.h280 { height: 280px; }
.chart-container.h250 { height: 250px; }
.chart-container.h200 { height: 200px; }

/* ─── Table ─── */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  text-align: left; padding: 12px 14px;
  border-bottom: 2px solid var(--border);
  color: var(--text-dim); font-weight: 600;
  font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
  background: var(--surface2);
}
.data-table th:first-child { border-radius: 8px 0 0 0; }
.data-table th:last-child { border-radius: 0 8px 0 0; }
.data-table td { padding: 10px 14px; border-bottom: 1px solid rgba(42,46,66,.5); }
.data-table tr:hover td { background: var(--surface2); }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table .path { font-family: 'JetBrains Mono',monospace; font-size: 12px; color: var(--accent2); }

/* ─── Badge ─── */
.badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; letter-spacing: .3px; }
.badge.high { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
.badge.medium { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(245,158,11,.2); }
.badge.low { background: var(--green-bg); color: var(--green); border: 1px solid rgba(16,185,129,.2); }
.badge.info { background: rgba(99,102,241,.1); color: var(--accent2); border: 1px solid rgba(99,102,241,.2); }

/* ─── Insight Card ─── */
.insight {
  padding: 18px 20px; border-radius: var(--radius-sm);
  margin-bottom: 14px; border-left: 4px solid;
  transition: transform .15s;
}
.insight:hover { transform: translateX(4px); }
.insight.correlation { background: rgba(99,102,241,.06); border-color: var(--accent); }
.insight.gap { background: rgba(239,68,68,.06); border-color: var(--red); }
.insight.alignment { background: rgba(6,182,212,.06); border-color: var(--cyan); }
.insight-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
.insight-detail { font-size: 13px; color: var(--text-dim); line-height: 1.7; }
.insight-sources { display: flex; gap: 6px; margin-top: 10px; }

/* ─── Coherence Meter ─── */
.coherence-details { display: flex; flex-direction: column; gap: 14px; margin-top: 16px; }
.coherence-item { display: flex; align-items: center; gap: 14px; }
.coherence-item .label { width: 130px; font-size: 13px; color: var(--text-dim); font-weight: 500; }
.coherence-item .bar { flex: 1; }
.coherence-item .score-text { width: 55px; text-align: right; font-size: 13px; font-weight: 700; }
.progress-bar { background: var(--surface3); border-radius: 6px; height: 10px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 6px; transition: width .8s ease; }

/* ─── Funnel ─── */
.funnel { display: flex; flex-direction: column; gap: 10px; padding: 8px 0; }
.funnel-step { display: flex; align-items: center; gap: 14px; }
.funnel-label { width: 120px; font-size: 13px; font-weight: 600; color: var(--text-dim); }
.funnel-bar-wrap { flex: 1; position: relative; }
.funnel-bar {
  height: 38px; border-radius: 8px;
  display: flex; align-items: center; padding: 0 14px;
  font-size: 13px; font-weight: 700; color: #fff;
  transition: width .6s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.funnel-rate { width: 65px; text-align: right; font-size: 13px; font-weight: 600; color: var(--text-dim); }

/* ─── Caveat ─── */
.caveat {
  background: rgba(245,158,11,.06);
  border: 1px solid rgba(245,158,11,.15);
  border-radius: var(--radius-sm);
  padding: 16px 20px; margin: 18px 0;
  font-size: 13px; color: var(--yellow);
  line-height: 1.7;
}
.caveat strong { display: block; margin-bottom: 6px; font-size: 14px; }

/* ─── Risk & Rec ─── */
.risk-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(42,46,66,.3); }
.risk-item:last-child { border: none; }
.risk-dot { width: 12px; height: 12px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; box-shadow: 0 0 6px; }
.risk-dot.high { background: var(--red); box-shadow: 0 0 6px var(--red); }
.risk-dot.medium { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }

.rec-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(42,46,66,.3); }
.rec-item:last-child { border: none; }
.rec-priority { font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
.rec-priority.P1 { background: var(--red-bg); color: var(--red); }
.rec-priority.P2 { background: var(--yellow-bg); color: var(--yellow); }
.rec-priority.P3 { background: rgba(99,102,241,.1); color: var(--accent2); }

/* ─── Heatmap ─── */
.heatmap { display: grid; gap: 3px; }
.heatmap-cell {
  border-radius: 3px; aspect-ratio: 1; min-width: 16px;
  transition: transform .15s;
  cursor: default;
}
.heatmap-cell:hover { transform: scale(1.3); z-index: 1; }
.heatmap-legend { display: flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 11px; color: var(--text-dim); }
.heatmap-legend span { width: 14px; height: 14px; border-radius: 3px; }

/* ─── Stat Boxes ─── */
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.stat-box {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 16px; text-align: center;
  border: 1px solid var(--border);
}
.stat-box .val { font-size: 24px; font-weight: 800; }
.stat-box .lbl { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* ─── Section Header ─── */
.section-header {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 20px; padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.section-header h2 { font-size: 20px; font-weight: 800; }
.section-header .desc { font-size: 13px; color: var(--text-dim); }

/* ─── Footer ─── */
.footer { text-align: center; padding: 36px 0; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 48px; }
.footer a { color: var(--accent2); text-decoration: none; }

/* ─── Loading ─── */
.loading { display: flex; justify-content: center; align-items: center; min-height: 400px; font-size: 16px; color: var(--text-dim); gap: 12px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="container header-inner">
    <div>
      <h1><span>SANDI</span> Customer Insights</h1>
      <div class="header-sub">고객 행동 종합 분석 &middot; GA4 + Zendesk + Jira</div>
    </div>
    <div class="header-meta">
      <span><span class="live-dot"></span> Live</span>
      <span id="lastUpdated">Loading…</span>
    </div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="container">
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="overview">🏠 전체 종합</button>
    <button class="tab" data-tab="ga">📊 GA 분석</button>
    <button class="tab" data-tab="zendesk">🎧 Zendesk CS</button>
    <button class="tab" data-tab="jira">🛠️ Jira / 개발</button>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div>데이터 로딩 중…</div>
  </div>
</div>

<!-- ═══ FOOTER ═══ -->
<div class="footer">
  <div class="container">
    <strong>SANDI Customer Insights v1.0</strong> &mdash; SNI CDO Platform Team<br>
    Data: Google Analytics 4 &middot; Zendesk CS &middot; Jira SA2025<br>
    <span style="font-size:11px">Auto-refreshed via GitHub Actions</span>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   CORE
   ═══════════════════════════════════════════════════════ */
let DATA = null;

async function loadData() {
  try {
    const r = await fetch('data.json');
    DATA = await r.json();
    document.getElementById('lastUpdated').textContent =
      new Date(DATA.generated_at).toLocaleString('ko-KR', {timeZone:'Asia/Seoul'});
    render();
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="loading" style="color:var(--red)">data.json 로드 실패<br><small>collect_all.py를 먼저 실행하세요</small></div>`;
  }
}

/* ─── Tab Navigation ─── */
function initTabs() {
  document.querySelectorAll('.tab').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + btn.dataset.tab)?.classList.add('active');
    };
  });
}
initTabs();

/* ─── Utilities ─── */
const fmt = n => n == null ? '–' : n.toLocaleString('ko-KR');
const pct = (n,d=1) => n == null ? '–' : n.toFixed(d) + '%';
const scoreColor = s => s >= 70 ? 'var(--green)' : s >= 40 ? 'var(--yellow)' : 'var(--red)';
const scoreHex = s => s >= 70 ? '#10b981' : s >= 40 ? '#f59e0b' : '#ef4444';

function createScoreRing(score, size = 150) {
  const r = (size - 14) / 2, c = Math.PI * 2 * r;
  const offset = c - (score / 100) * c;
  const clr = scoreHex(score);
  return `
    <div class="score-ring" style="width:${size}px;height:${size}px">
      <svg width="${size}" height="${size}">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="12"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${clr}" stroke-width="12"
                stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
                style="filter:drop-shadow(0 0 6px ${clr})"/>
      </svg>
      <div class="value" style="color:${clr}">${score}</div>
      <div class="label-text">/ 100</div>
    </div>`;
}

/* ─── Chart Defaults ─── */
Chart.defaults.color = '#7c819a';
Chart.defaults.borderColor = 'rgba(42,46,66,.5)';
Chart.defaults.font.family = "'Pretendard','Inter',sans-serif";
Chart.defaults.font.size = 12;
Chart.defaults.plugins.legend.labels.boxWidth = 12;
Chart.defaults.plugins.legend.labels.padding = 16;
Chart.defaults.plugins.tooltip.backgroundColor = '#1a1d2b';
Chart.defaults.plugins.tooltip.borderColor = '#2a2e42';
Chart.defaults.plugins.tooltip.borderWidth = 1;
Chart.defaults.plugins.tooltip.cornerRadius = 8;
Chart.defaults.plugins.tooltip.padding = 12;

const COLORS = ['#6366f1','#3b82f6','#06b6d4','#10b981','#f59e0b','#f97316','#ef4444','#a855f7','#ec4899','#14b8a6'];
const GRADIENTS = {};

function getGradient(ctx, c1, c2, vertical=true) {
  const key = c1+c2;
  if (GRADIENTS[key]) return GRADIENTS[key];
  const g = vertical
    ? ctx.createLinearGradient(0,0,0,ctx.canvas.height)
    : ctx.createLinearGradient(0,0,ctx.canvas.width,0);
  g.addColorStop(0, c1); g.addColorStop(1, c2);
  GRADIENTS[key] = g;
  return g;
}

/* ═══════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════ */
function render() {
  document.getElementById('content').innerHTML = `
    <div id="panel-overview" class="tab-panel active">${renderOverview()}</div>
    <div id="panel-ga" class="tab-panel">${renderGA()}</div>
    <div id="panel-zendesk" class="tab-panel">${renderZendesk()}</div>
    <div id="panel-jira" class="tab-panel">${renderJira()}</div>
  `;
  initTabs();
  setTimeout(renderAllCharts, 50);
  animateCounters();
}

/* ─── Animate Counters ─── */
function animateCounters() {
  document.querySelectorAll('[data-count]').forEach(el => {
    const target = parseFloat(el.dataset.count);
    const suffix = el.dataset.suffix || '';
    const duration = 1200;
    const start = performance.now();
    function tick(now) {
      const p = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      const val = Math.round(target * ease);
      el.textContent = val.toLocaleString('ko-KR') + suffix;
      if (p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  });
}

/* ═══ TAB 1: OVERVIEW ═══════════════════════════════════ */
function renderOverview() {
  const ga = DATA.ga.summary || {};
  const zd = DATA.zendesk || {};
  const jr = DATA.jira || {};
  const ins = DATA.insights || {};
  const mom = ga.mau_mom_growth || 0;

  return `
    <!-- Hero KPI -->
    <div class="kpi-row">
      <div class="kpi" style="--accent-kpi:var(--accent)">
        <div class="kpi-icon">👥</div>
        <div class="kpi-label">Monthly Active Users</div>
        <div class="kpi-value" data-count="${ga.current_mau||0}">${fmt(ga.current_mau)}</div>
        <div class="kpi-sub ${mom>=0?'up':'down'}">MoM ${mom>=0?'+':''}${mom}%</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">🚀</div>
        <div class="kpi-label">Activation Rate</div>
        <div class="kpi-value">${pct(ga.aarrr_activation_rate)}</div>
        <div class="kpi-sub neutral">서비스 아이콘 클릭 기준</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">🔄</div>
        <div class="kpi-label">Retention Rate</div>
        <div class="kpi-value" style="color:${(ga.aarrr_retention_rate||0)<20?'var(--red)':'var(--green)'}">${pct(ga.aarrr_retention_rate)}</div>
        <div class="kpi-sub ${(ga.aarrr_retention_rate||0)<20?'down':'up'}">engagement / session</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">🎧</div>

/* ═══ TAB 2: GA ═══════════════════════════════════════ */
function renderGA() {

  const s = ga.summary || {};
  const mau = ga.mau || [];
  const latestPV = s.current_pv || 0;
  const pvsPerSession = s.current_sessions > 0 ? (latestPV / s.current_sessions).toFixed(1) : '–';

  return `
    <div class="section-header">
      <h2>📊 Google Analytics 분석</h2>
      <span class="desc">SANDI App 사용자 행동 데이터 (최근 30일 기준)</span>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="kpi-icon">👥</div><div class="kpi-label">MAU</div><div class="kpi-value" data-count="${s.current_mau||0}">${fmt(s.current_mau)}</div><div class="kpi-sub neutral">Peak ${fmt(s.mau_peak)} (${s.mau_peak_month||''})</div></div>
      <div class="kpi"><div class="kpi-icon">📱</div><div class="kpi-label">Page Views</div><div class="kpi-value" data-count="${latestPV}">${fmt(latestPV)}</div></div>
      <div class="kpi"><div class="kpi-icon">🔄</div><div class="kpi-label">Sessions</div><div class="kpi-value" data-count="${s.current_sessions||0}">${fmt(s.current_sessions)}</div></div>
      <div class="kpi"><div class="kpi-icon">📄</div><div class="kpi-label">PV/Session</div><div class="kpi-value">${pvsPerSession}</div></div>
      <div class="kpi"><div class="kpi-icon">🆕</div><div class="kpi-label">신규 사용자 비율</div><div class="kpi-value">${pct(s.aarrr_new_user_rate)}</div></div>
    </div>

    <!-- MAU Trend -->
    <div class="card">
      <h3><span class="icon">📈</span> MAU 월별 추이</h3>
      <div class="card-subtitle">${mau.length}개월간 활성 사용자 수 변화</div>
      <div class="chart-container h350"><canvas id="chart-mau"></canvas></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3><span class="icon">🔽</span> AARRR 퍼널</h3>
        <div class="card-subtitle">사용자 여정별 전환율</div>
        <div id="ga-funnel"></div>
      </div>
      <div class="card">
        <h3><span class="icon">📊</span> PV & Sessions 추이</h3>
        <div class="chart-container h280"><canvas id="chart-sessions"></canvas></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3><span class="icon">🏢</span> 서비스별 사용률</h3>
        <div class="chart-container h350"><canvas id="chart-services"></canvas></div>
      </div>
      <div class="card">
        <h3><span class="icon">🥧</span> 트래픽 분포</h3>
        <div class="chart-container h350"><canvas id="chart-traffic-pie"></canvas></div>
      </div>
    </div>

    <!-- Treemap + Area Chart Row -->
    <div class="grid-2">
      <div class="card">
        <h3><span class="icon">🌳</span> 페이지 트래픽 트리맵</h3>
        <div class="card-subtitle">면적 = PV 크기. 어떤 페이지가 트래픽을 지배하는지 시각화</div>
        <div class="chart-container h350"><canvas id="chart-treemap"></canvas></div>
      </div>
      <div class="card">
        <h3><span class="icon">📐</span> MAU vs PV 면적 추이</h3>
        <div class="card-subtitle">12개월간 MAU와 PV 변화를 면적으로 비교</div>
        <div class="chart-container h350"><canvas id="chart-area"></canvas></div>
      </div>
    </div>

    <!-- Top Pages -->
    <div class="card">
      <h3><span class="icon">📄</span> Top 20 페이지</h3>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr><th>#</th><th>페이지</th><th class="num">PV</th><th class="num">사용자</th><th class="num">세션</th><th class="num">PV/User</th><th>점유율</th></tr></thead>
          <tbody>
            ${(() => {
              const totalPV = (ga.top_pages||[]).reduce((s,v)=>s+v.pageViews,0);
              return (ga.top_pages||[]).slice(0,20).map((p,i) => {
                const share = totalPV>0 ? p.pageViews/totalPV*100 : 0;
                return `<tr>
                  <td>${i+1}</td>
                  <td class="path">${p.path}</td>
                  <td class="num">${fmt(p.pageViews)}</td>
                  <td class="num">${fmt(p.users)}</td>
                  <td class="num">${fmt(p.sessions)}</td>
                  <td class="num">${(p.pageViews/Math.max(p.users,1)).toFixed(1)}</td>
                  <td><div class="progress-bar" style="width:100px"><div class="progress-fill" style="width:${Math.min(share*3,100)}%;background:var(--accent)"></div></div> <span style="font-size:11px;color:var(--text-dim)">${share.toFixed(1)}%</span></td>
                </tr>`;
              }).join('');
            })()}
          </tbody>
        </table>
      </div>
    </div>

    <!-- Service Deep Dive -->
    <div class="card">
      <h3><span class="icon">🔍</span> 서비스 Deep Dive</h3>
      <div style="overflow-x:auto">
        <table class="data-table">
          <thead><tr><th>서비스</th><th class="num">PV</th><th class="num">사용자</th><th class="num">세션</th><th class="num">PV/User</th><th class="num">점유율</th></tr></thead>
          <tbody>
            ${(() => {
              const svcs = (ga.services||[]).filter(s => !s.path.match(/GS_\\d+/));
              const total = svcs.reduce((s,v) => s + v.pageViews, 0);
              return svcs.slice(0,15).map(s => `
                <tr>
                  <td class="path">${s.path.replace('/service/','')}</td>
                  <td class="num">${fmt(s.pageViews)}</td>
                  <td class="num">${fmt(s.users)}</td>
                  <td class="num">${fmt(s.sessions)}</td>
                  <td class="num">${(s.pageViews/Math.max(s.users,1)).toFixed(1)}</td>
                  <td class="num">${total>0?pct(s.pageViews/total*100):'-'}</td>
                </tr>
              `).join('');
            })()}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

/* ─── AARRR Funnel ─── */
function buildFunnel(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const aarrr = DATA.ga.aarrr || [];
  const steps = [
    { label: 'Acquisition', event: 'session_start', color: '#6366f1', gradient: 'linear-gradient(90deg,#6366f1,#818cf8)' },
    { label: 'Activation', event: 'service_icon_click_event', color: '#3b82f6', gradient: 'linear-gradient(90deg,#3b82f6,#60a5fa)' },
    { label: 'Engagement', event: 'user_engagement', color: '#06b6d4', gradient: 'linear-gradient(90deg,#06b6d4,#22d3ee)' },
    { label: 'New Users', event: 'first_visit', color: '#10b981', gradient: 'linear-gradient(90deg,#10b981,#34d399)' },
  ];
  const maxU = Math.max(...aarrr.map(a => a.users), 1);
  const ssU = aarrr.find(a => a.event === 'session_start')?.users || 1;

  el.innerHTML = '<div class="funnel">' + steps.map(m => {
    const item = aarrr.find(a => a.event === m.event) || {users:0};
    const w = Math.max(item.users / maxU * 100, 8);
    const rate = (item.users / ssU * 100).toFixed(1);
    return `
      <div class="funnel-step">
        <span class="funnel-label">${m.label}</span>
        <div class="funnel-bar-wrap">
          <div class="funnel-bar" style="width:${w}%;background:${m.gradient};box-shadow:0 2px 10px ${m.color}44">${fmt(item.users)}</div>
        </div>
        <span class="funnel-rate">${rate}%</span>
      </div>`;
  }).join('') + '</div>';
}

/* ─── Traffic Pie ─── */
function renderTrafficPie() {
  const c = document.getElementById('chart-traffic-pie');
  if (!c) return;
  const pages = DATA.ga.top_pages || [];
  const cats = {};
  pages.forEach(p => {
    const path = p.path;
    let cat;
    if (path === '/') cat = '홈';
    else if (path.startsWith('/talk')) cat = '건물톡';
    else if (path.startsWith('/service')) cat = '서비스';
    else if (path.startsWith('/manager')) cat = '매니저';
    else if (path.startsWith('/auth') || path === '/login') cat = '인증';
    else if (path.startsWith('/myinfo')) cat = '내정보';
    else cat = '기타';
    cats[cat] = (cats[cat]||0) + p.pageViews;
  });
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  new Chart(c, {
    type:'doughnut',
    data:{
      labels:sorted.map(s=>s[0]),
      datasets:[{data:sorted.map(s=>s[1]),backgroundColor:COLORS,borderWidth:0,hoverOffset:8}]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right'},
        tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.raw.toLocaleString('ko-KR')} PV`}}},
      cutout:'60%'
    }
  });
}

/* ─── Heatmap (Overview) ─── */
function renderHeatmap() {
  const el = document.getElementById('heatmap-container');
  if (!el) return;
  const daily = DATA.zendesk.daily || {};
  const dates = Object.keys(daily).sort();
  if (dates.length === 0) { el.innerHTML = '<p style="color:var(--text-dim);font-size:13px">데이터 없음</p>'; return; }

  const maxTotal = Math.max(...dates.map(d => Object.values(daily[d]).reduce((s,v)=>s+v,0)), 1);
  const cols = Math.min(dates.length, 15);

  let html = `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:4px">`;
  dates.slice(-cols * 3).forEach(date => {
    const total = Object.values(daily[date]).reduce((s,v)=>s+v,0);
    const intensity = total / maxTotal;
    const r = Math.round(99 + (intensity * 156));
    const g = Math.round(102 + (intensity * (-102+69)));
    const b = Math.round(241 + (intensity * (-241+68)));
    const alpha = 0.15 + intensity * 0.85;
    const bg = total === 0 ? 'var(--surface3)' : `rgba(${r<256?99:239},${g>0?102:68},${b>0?241:68},${alpha.toFixed(2)})`;
    html += `<div class="heatmap-cell" style="background:${bg}" title="${date}: ${total}건"></div>`;
  });
  html += '</div>';
  html += `<div class="heatmap-legend"><span style="background:var(--surface3)"></span>0건 <span style="background:rgba(99,102,241,.3)"></span>적음 <span style="background:rgba(99,102,241,.7)"></span>보통 <span style="background:rgba(99,102,241,1)"></span>많음</div>`;
  el.innerHTML = html;
}
